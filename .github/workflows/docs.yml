# This workflow will only be executed if a tag was defined and we are currently in the main branch.
# All other configurations will not be executed.  This will ensure that the officially generated
# documentations will only be generaetd within those parameters.

name: Deploy Data Loader Documentation

on:
  pull_request:
    tags:
      - 'v[0-9]+.*'
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.pages_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Prepare Files
        run: |
          doxygen

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './doc'

      - name: Deploy the Data Loader Pages to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
