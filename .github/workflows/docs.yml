name: Deploy Data Loader Documentation

on:
  ["pull_request", "push"]:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.pages_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Files
        run: |
          doxygen

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './doc'

      - name: Deploy the Data Loader Pages to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
